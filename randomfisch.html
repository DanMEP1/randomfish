<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisch Wheel Code Config</title>
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        h1 {
            margin-top: 10px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
            font-size: 26px;
        }
        p.subtitle {
            color: #a4b0be;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .wheel-container {
            position: relative;
            width: 380px;
            height: 380px;
            margin-bottom: 20px;
        }
        /* Стрелка указателя */
        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.5));
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.7), 0 0 0 12px #2f3542;
            transition: transform 5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        .spin-btn {
            margin-bottom: 35px;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: 0.2s;
        }
        .spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(255, 71, 87, 0.6);
        }
        .spin-btn:active {
            transform: scale(0.95);
        }
        
        /* Таблица счетчика улова */
        .counter-container {
            width: 100%;
            max-width: 500px;
            background: #1e1e24;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #2f3542;
        }
        .counter-title {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 16px;
            text-align: center;
            color: #a4b0be;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #2f3542;
        }
        th {
            color: #747d8c;
            font-weight: 600;
        }
        .count-cell {
            text-align: right;
            font-weight: bold;
            font-size: 16px;
            width: 60px;
        }
        .total-row {
            font-weight: bold;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Всплывающее окно результата */
        #result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1e24;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.85);
            z-index: 20;
            min-width: 280px;
        }
        #result-title {
            font-size: 14px;
            color: #a4b0be;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #result-fish {
            font-size: 32px;
            font-weight: bold;
            margin: 12px 0 6px 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        #result-rarity {
            font-size: 15px;
            color: #ffffff;
            margin: 0 0 12px 0;
            font-weight: 500;
        }
        #result-location {
            font-size: 16px;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: bold;
        }
        #result-chance {
            font-size: 13px;
            color: #747d8c;
            margin-bottom: 20px;
            margin-top: 0;
        }
        #close-btn {
            padding: 10px 25px;
            background: #2f3542;
            border: 1px solid #57606f;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #close-btn:hover {
            background: #57606f;
        }
    </style>
</head>
<body>

    <h1>🎡 Реалистичное Колесо Fisch</h1>

    <div class="wheel-container">
        <div class="arrow"></div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button class="spin-btn" id="spin">Выбрать Рандомную рыбу</button>

    <!-- Таблица счетчика улова -->
    <div class="counter-container">
        <p class="counter-title">Все рыбы</p>
        <table>
            <thead>
                <tr>
                    <th>Рыба</th>
                    <th>Редкость</th>
                    <th style="text-align: right;">Поймано</th>
                </tr>
            </thead>
            <tbody id="counter-body"></tbody>
            <tfoot>
                <tr class="total-row">
                    <td>Всего улова</td>
                    <td>—</td>
                    <td id="total-count" style="text-align: right;">0 шт.</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- Модалка с результатом -->
    <div id="result-modal">
        <p id="result-title">Выпало:</p>
        <div id="result-fish">---</div>
        <p id="result-rarity">Редкость: --</p>
        <div id="result-location">📍 Место: --</div>
        <p id="result-chance">Шанс на колесе: --%</p>
        <button id="close-btn">ОК</button>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКА ЦВЕТОВ РЫБ ПРЯМО В КОДЕ НИЖЕ:
        // Вы можете менять HEX-коды (например, "#2ed573") на любые другие.
        // ==========================================
        const COLOR_R    = "#7d97ff"; // Цвет для Marlin (Редкая)
        const COLOR_E     = "#a30cfa"; // Цвет для Anglerfish (Редкая)
        const COLOR_L    = "#fac800"; // Цвет для Glacier Fish (Редкая)
        
        const COLOR_M = "#fa0000"; // Цвет для Hammerhead Shark (Легендарная)

        // ==========================================

        // Массив данных рыб, использующий настроенные выше константы цветов
        const fishes = [
            { id: "ads", name: "Ancient Depth Serpent", rarity: "Редкая 💎", location: " The Depths(Глубины)", weight: 30, color: COLOR_R, count: 0 },
            { id: "meg", name: "Megalodon", rarity: "Редкая 💎", location: "Megalodon Hunt(Anciet Isle)", weight: 25, color: COLOR_R, count: 0 },
            { id: "cr_angler", name: "Crowned Anglerfish", rarity: "Редкая 💎", location: "Abyssal Zenith", weight: 20, color: COLOR_R, count: 0 },
            { id: "cry_seadragon", name: "Crystallized Seadragon", rarity: "Редкая 💎", location: "Calm Zone", weight: 20, color: COLOR_R, count: 0 },
            { id: "m_lev", name: "Magma Leviathan", rarity: "Редкая 💎", location: "Volcanic Vents", weight: 20, color: COLOR_R, count: 0 },
            { id: "fr_lev", name: "Frozen Leviathan", rarity: "Редкая 💎", location: "Challenger's Deep", weight: 20, color: COLOR_R, count: 0 },
            { id: "gw", name: "Goldwraith", rarity: "Редкая 💎", location: "Goldwraith Hunt", weight: 15, color: COLOR_R, count: 0 },
            { id: "omn", name: "Omnithal", rarity: "Редкая 💎", location: "Omnithal Hunt", weight: 15, color: COLOR_R, count: 0 },
            { id: "plis", name: "Pliosaur", rarity: "Редкая 💎", location: "Pliosaur Hunt", weight: 15, color: COLOR_R, count: 0 },
            { id: "r_titan", name: "Reef Titan", rarity: "Редкая 💎", location: "Reef Titan Hunt", weight: 15, color: COLOR_R, count: 0 },
            { id: "bbf", name: "Baby Bloop Fish", rarity: "Редкая 💎", location: "Baby Bloop Hunt", weight: 15, color: COLOR_R, count: 0 },
            { id: "ww", name: "Wyvern", rarity: "Редкая 💎", location: "Above The Clouds", weight: 15, color: COLOR_R, count: 0 },
            { id: "cbd", name: "Collosal Blue Drahon", rarity: "Редкая 💎", location: "Luminescent Cavern", weight: 15, color: COLOR_R, count: 0 },
            { id: "cad", name: "Collosal Ancient Dragon", rarity: "Редкая 💎", location: "Crimson Cavern", weight: 15, color: COLOR_R, count: 0 },
            { id: "oc", name: "Orca", rarity: "Редкая 💎", location: "Orca Hunt", weight: 15, color: COLOR_R, count: 0 },
            { id: "b", name: "Banana", rarity: "Эпическая ☀️", location: "Ancient Isle(Древний остров)", weight: 10, color: COLOR_E, count: 0 },
            { id: "bss", name: "Blue Sea Slug", rarity: "Эпическая ☀️", location: "Luminescent Cavern", weight: 8, color: COLOR_E, count: 0 },
            { id: "ced", name: "Colossal Ethereal Dragon", rarity: "Эпическая ☀️", location: "Luminescent Cavern / Crimson cavern", weight: 10, color: COLOR_E, count: 0 },
            { id: "sc", name: "Scylla", rarity: "Эпическая ☀️", location: "Veil of Forsaken", weight: 10, color: COLOR_E, count: 0 },
            { id: "mt", name: "Mustard", rarity: "Эпическая ☀️", location: "Ocean", weight: 10, color: COLOR_E, count: 0 },
            { id: "lp", name: "Long Pike", rarity: "Эпическая ☀️", location: "Ocean", weight: 10, color: COLOR_E, count: 0 },
            { id: "mn", name: "Manatee", rarity: "Эпическая ☀️", location: "Terrapin Island", weight: 10, color: COLOR_E, count: 0 },
            { id: "ggs", name: "Great Goldcursed Shark", rarity: "Эпическая ☀️", location: "Castway Clifs", weight: 10, color: COLOR_E, count: 0 },
            { id: "g_blop", name: "Gem Blobfish", rarity: "Эпическая ☀️", location: "Tresuare Island", weight: 10, color: COLOR_E, count: 0 },
            { id: "bf", name: "Bloop Fish", rarity: "Легендарные ⭐", location: "Bloop Fish Hunt", weight: 5, color: COLOR_L, count: 0 },
            { id: "mlr", name: "Mosslurker", rarity: "Легендарные ⭐", location: "Mosslurker Hunt", weight: 5, color: COLOR_L, count: 0 },
            { id: "nwl", name: "Narwhal", rarity: "Легендарные ⭐", location: "Narwhal Hunt", weight: 5, color: COLOR_L, count: 0 },
            { id: "crf", name: "Colossus Reef Titan", rarity: "Легендарные ⭐", location: "Colossus Reef Titan Hunt", weight: 5, color: COLOR_L, count: 0 },
            { id: "agw", name: "Ancient Goldwraith", rarity: "Легендарные ⭐", location: "Ancient Goldwraith Hunt", weight: 5, color: COLOR_L, count: 0 },
            { id: "aomn", name: "Awakened Omnithal", rarity: "Легендарные ⭐", location: "Awakened Omnithal Hunt", weight: 5, color: COLOR_L, count: 0 },
            { id: "pf", name: "Profane Leviathann", rarity: "Легендарные ⭐", location: "Cultist Lair", weight: 5, color: COLOR_L, count: 0 },
            { id: "ap", name: "Ancestral Pliosaur", rarity: "Легендарные ⭐", location: "Ancestral Pliosaur Hunt", weight: 5, color: COLOR_L, count: 0 },
            { id: "cc", name: "Cataclysm Carp", rarity: "Мифические 🌟", location: "Moosewood", weight: 1, color: COLOR_M, count: 0 },
            { id: "af", name: "Aetherfin", rarity: "Мифические 🌟", location: "Roslit Bay", weight: 1, color: COLOR_M, count: 0 },
            { id: "him", name: "Him", rarity: "Мифические 🌟", location: "Везде", weight: 1, color: COLOR_M, count: 0 },
            { id: "od", name: "Olympian Devil", rarity: "Мифические 🌟", location: "Olympian Fissure", weight: 1, color: COLOR_M, count: 0 },
        ];

        // Системные переменные
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin');
        const modal = document.getElementById('result-modal');
        const resultFish = document.getElementById('result-fish');
        const resultRarity = document.getElementById('result-rarity');
        const resultLocation = document.getElementById('result-location');
        const resultChance = document.getElementById('result-chance');
        const closeBtn = document.getElementById('close-btn');
        const counterBody = document.getElementById('counter-body');
        const totalCountEl = document.getElementById('total-count');

        const totalWeight = fishes.reduce((sum, f) => sum + f.weight, 0);
        let currentRotation = 0;
        let isSpinning = false;
        let lastWinner = null;

        // Функция обновления таблицы улова
        function updateCounterTable() {
            counterBody.innerHTML = "";
            let totalCaught = 0;
            
            fishes.forEach(fish => {
                totalCaught += fish.count;
                const row = document.createElement('tr');
                row.id = `row-${fish.id}`;
                row.innerHTML = `
                    <td style="font-weight: bold; color: ${fish.color}">${fish.name}</td>
                    <td style="color: #a4b0be">${fish.rarity}</td>
                    <td class="count-cell" id="count-${fish.id}">${fish.count} шт.</td>
                `;
                counterBody.appendChild(row);
            });
            
            totalCountEl.innerText = `${totalCaught} шт.`;
        }

        // Отрисовка колеса на Canvas
        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let currentAngle = 0;

            for (let i = 0; i < fishes.length; i++) {
                const fish = fishes[i];
                const arcAngle = (fish.weight / totalWeight) * (Math.PI * 2);
                
                ctx.fillStyle = fish.color;
                ctx.beginPath();
                ctx.arc(radius, radius, radius, currentAngle, currentAngle + arcAngle, false);
                ctx.lineTo(radius, radius);
                ctx.fill();
                
                ctx.strokeStyle = "#2f3542";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                if (fish.weight > 1) {
                    ctx.save();
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "bold 16px sans-serif";
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = "rgba(0,0,0,0.6)";
                    ctx.translate(radius, radius);
                    ctx.rotate(currentAngle + arcAngle / 2);
                    ctx.textAlign = "right";
                    ctx.fillText(fish.name, radius - 30, 6);
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "bold 18px sans-serif";
                    ctx.translate(radius, radius);
                    ctx.rotate(currentAngle + arcAngle / 2);
                    ctx.textAlign = "right";
                    ctx.fillText("", radius - 10, 7);
                    ctx.restore();
                }
                currentAngle += arcAngle;
            }
        }

        // Логика запуска вращения
        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            modal.style.display = 'none';

            const randomPick = Math.random() * totalWeight;
            let countedWeight = 0;
            let winningIndex = 0;

            for (let i = 0; i < fishes.length; i++) {
                countedWeight += fishes[i].weight;
                if (randomPick <= countedWeight) {
                    winningIndex = i;
                    break;
                }
            }

            lastWinner = fishes[winningIndex];

            let startAngleDeg = 0;
            for (let i = 0; i < winningIndex; i++) {
                startAngleDeg += (fishes[i].weight / totalWeight) * 360;
            }
            const sectorWidthDeg = (lastWinner.weight / totalWeight) * 360;
            const randomPointInSector = startAngleDeg + (Math.random() * (sectorWidthDeg * 0.8) + (sectorWidthDeg * 0.1));
            const targetRotation = (360 - randomPointInSector + 270) % 360;

            const totalSpinsDegrees = 2160 + targetRotation;
            const baseRotation = Math.ceil(currentRotation / 360) * 360;
            currentRotation = baseRotation + totalSpinsDegrees;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                
                resultFish.innerText = lastWinner.name;
                resultFish.style.color = lastWinner.color;
                resultRarity.innerText = `Редкость: ${lastWinner.rarity}`;
                
                resultLocation.innerText = `📍 Локация: ${lastWinner.location}`;
                resultLocation.style.color = lastWinner.color;
                resultLocation.style.background = `${lastWinner.color}15`;
                
                const percentChance = ((lastWinner.weight / totalWeight) * 100).toFixed(2);
                resultChance.innerText = `Шанс выпадения на колесе: ${percentChance}%`;
                
                modal.style.border = `3px solid ${lastWinner.color}`;
                modal.style.display = 'block';
            }, 5000);
        });

        closeBtn.addEventListener('click', () => {
            if (lastWinner) {
                lastWinner.count += 1;
                updateCounterTable();
                
                const updatedRow = document.getElementById(`row-${lastWinner.id}`);
                updatedRow.style.background = `${lastWinner.color}30`;
                setTimeout(() => {
                    updatedRow.style.background = 'transparent';
                }, 800);
            }
            modal.style.display = 'none';
        });

        // Инициализация при первом открытии
        updateCounterTable();
        drawWheel();
    </script>
</body>
</html>
